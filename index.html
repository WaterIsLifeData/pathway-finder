<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldServe Water Pathway Finder — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F4F5; --card:#FFFFFF;
    --ink:#072335; --ink-soft:#333333; --ink-faint:#6E7C86;
    --line:#DDE4E4; --line-soft:#E9EEEE;
    --a:#005883; --a-deep:#003C59; --a-tint:#E1EBF0; --a-tint2:#F1F6F8;
    --b:#00BADA; --b-deep:#0092AC; --b-tint:#DEF7FB; --b-tint2:#F0FBFD;
    --c:#005883; --c-deep:#003C59; --c-tint:#E1EBF0; --c-tint2:#F1F6F8;
    --radius:16px; --shadow:0 1px 2px rgba(22,34,31,.05), 0 18px 50px -28px rgba(22,34,31,.4);
    --accent:var(--a); --deep:var(--a-deep); --tint:var(--a-tint); --tint2:var(--a-tint2);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:17px;line-height:1.6;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  h1,h2,h3,h4{font-family:"Bricolage Grotesque","Inter",sans-serif;line-height:1.05;letter-spacing:-.015em;margin:0}
  p{margin:0 0 1em}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}

  .stage{max-width:760px;margin:0 auto;padding:26px 22px 90px}

  /* ---------- HOME ---------- */
  .home-hero{padding:46px 0 30px;text-align:center}
  .home-hero .eyebrow{color:var(--a-deep)}
  .home-hero h1{font-size:clamp(34px,6vw,52px);font-weight:800;margin:.3em auto .3em;max-width:16ch}
  .home-hero h1 .g{color:var(--a)}
  .home-hero p{color:var(--ink-soft);max-width:54ch;margin:0 auto;font-size:18px;font-weight:450}
  .vcards{display:grid;grid-template-columns:1fr;gap:14px;margin-top:34px}
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:0;box-shadow:var(--shadow);
    overflow:hidden;text-align:left;display:grid;grid-template-columns:7px 1fr auto;align-items:center;transition:transform .18s ease,box-shadow .18s ease}
  .vcard:hover{transform:translateY(-2px);box-shadow:0 1px 2px rgba(22,34,31,.05),0 26px 60px -30px rgba(22,34,31,.5)}
  .vcard .bar{align-self:stretch}
  .vcard.a .bar{background:var(--a)} .vcard.b .bar{background:var(--b)} .vcard.c .bar{background:var(--c)}
  .vcard .body{padding:20px 6px 20px 22px}
  .vcard .tag{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .vcard.a .tag{color:var(--a-deep)} .vcard.b .tag{color:var(--b-deep)} .vcard.c .tag{color:var(--c-deep)}
  .vcard h3{font-size:21px;font-weight:700;margin:5px 0 5px}
  .vcard .ph{color:var(--ink-soft);font-size:14.5px;margin:0}
  .vcard .meta{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--ink-faint);margin-top:8px}
  .vcard .go{padding:0 22px;color:var(--ink-faint);font-size:26px;font-weight:300}
  .vcard.a:hover .go{color:var(--a)} .vcard.b:hover .go{color:var(--b)} .vcard.c:hover .go{color:var(--c)}
  .homenote{margin-top:26px;text-align:center;font-size:13.5px;color:var(--ink-faint);max-width:56ch;margin-left:auto;margin-right:auto}

  /* ---------- FLOW CHROME ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:8px}
  .vpill{display:inline-flex;align-items:center;gap:9px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--deep);padding:7px 14px;border-radius:999px}
  .linkbtn{background:none;border:0;color:var(--ink-faint);font-size:13.5px;font-weight:500;padding:6px 4px;border-radius:8px}
  .linkbtn:hover{color:var(--ink)}
  .philo-line{color:var(--ink-soft);font-size:14px;margin:2px 0 18px;font-style:italic}

  .progress{display:flex;align-items:center;gap:10px;margin:10px 0 26px}
  .ptrack{flex:1;height:6px;border-radius:999px;background:var(--line)}
  .pfill{height:6px;border-radius:999px;background:var(--b);transition:width .35s ease;width:0}
  .plabel{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--ink-faint);white-space:nowrap}

  /* ---------- QUESTION ---------- */
  .qwrap{animation:rise .34s ease}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .qhead{margin-bottom:4px}
  .qhead h2{font-size:clamp(24px,4vw,32px);font-weight:700;max-width:20ch}
  .qpurpose{font-size:14px;color:var(--ink-faint);margin:8px 0 0}
  .qhint{font-size:13.5px;color:var(--deep);font-weight:600;margin:6px 0 0}
  .opts{display:grid;grid-template-columns:1fr;gap:11px;margin-top:24px}
  .opt{display:flex;align-items:flex-start;gap:14px;text-align:left;width:100%;background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;padding:16px 18px;transition:border-color .15s ease,background .15s ease,transform .12s ease}
  .opt:hover{border-color:var(--accent);transform:translateX(2px)}
  .opt:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .opt .mk{flex-shrink:0;width:22px;height:22px;border-radius:7px;border:2px solid var(--line);margin-top:2px;display:grid;place-items:center;transition:.15s}
  .opt.sel{border-color:var(--accent);background:var(--tint2)}
  .opt.sel .mk{background:var(--accent);border-color:var(--accent)}
  .opt.sel .mk::after{content:"✓";color:#fff;font-size:13px;font-weight:700}
  .opt .ot{flex:1}
  .opt .ol{font-weight:600;font-size:16.5px;color:var(--ink);line-height:1.3}
  .opt .od{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
  .opt .arr{color:var(--ink-faint);font-size:18px;align-self:center}
  .opt:hover .arr{color:var(--accent)}
  .continue{margin-top:22px;display:flex;justify-content:flex-end}
  .resetrow{margin-top:26px;text-align:center}
  .resetrow .linkbtn{font-size:13px;color:var(--ink-faint)}
  .resetrow .linkbtn:hover{color:var(--deep)}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:11px;font-size:15.5px;font-weight:600;padding:13px 26px;transition:.15s}
  .btn:hover{background:var(--deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--deep);border:1.5px solid var(--accent)}
  .btn.ghost:hover{background:var(--tint2)}

  /* ---------- RESULT ---------- */
  .rwrap{animation:rise .4s ease}
  .rkick{font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--deep)}
  .rcard{background:var(--card);border:1px solid var(--line);border-top:7px solid var(--accent);border-radius:var(--radius);
    padding:30px 30px 28px;box-shadow:var(--shadow);margin-top:12px}
  .rcard h2{font-size:clamp(28px,5vw,40px);font-weight:800;margin:8px 0 14px}
  .rwhy{color:var(--ink-soft);font-size:17px;margin:0 0 22px}
  .rstep{background:var(--tint2);border-left:4px solid var(--accent);border-radius:10px;padding:16px 18px;margin-bottom:22px}
  .rstep .lab{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--deep);margin-bottom:5px}
  .rstep p{margin:0;font-weight:550;color:var(--ink);font-size:15.5px}
  .rprimary{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
  .kitlab,.altlab{font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
  .kitlab::after,.altlab::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  .kit{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin:0;padding:0;list-style:none}
  .kit li{position:relative;padding-left:20px;font-size:14.5px;color:var(--ink-soft);line-height:1.5}
  .kit li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .pk{font-size:13.5px;font-weight:500;padding:8px 13px;border-radius:9px;background:var(--tint2);border:1.5px solid var(--line);color:var(--ink);transition:.14s}
  .pk:hover{border-color:var(--accent)}
  .pk.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pickhint{font-size:12.5px;color:var(--ink-faint);margin-top:10px}
  .alts{display:grid;grid-template-columns:1fr;gap:9px}
  .altc{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px;text-align:left;width:100%;transition:.15s}
  .altc:hover{border-color:var(--accent);background:var(--tint2)}
  .altc .an{font-weight:600;font-size:15px}
  .altc .ad{font-size:12.5px;color:var(--ink-faint)}
  .altc .ag{color:var(--ink-faint);font-size:18px}
  .altc:hover .ag{color:var(--accent)}

  /* logic panel */
  .logic{margin-top:18px;border:1.5px dashed var(--accent);border-radius:14px;background:var(--tint2);overflow:hidden}
  .logic summary{list-style:none;cursor:pointer;padding:15px 18px;font-weight:600;color:var(--deep);font-size:15px;display:flex;align-items:center;gap:10px}
  .logic summary::-webkit-details-marker{display:none}
  .logic summary .chev{margin-left:auto;transition:transform .2s ease;color:var(--accent)}
  .logic[open] summary .chev{transform:rotate(90deg)}
  .logic .lbody{padding:2px 18px 18px}
  .logic .lh{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:8px 0 8px}
  .logic ul{margin:0 0 8px;padding-left:18px}
  .logic li{font-size:14px;color:var(--ink-soft);margin-bottom:6px}
  .logic li b{color:var(--ink);font-weight:600}
  .otherm{display:flex;flex-wrap:wrap;gap:7px}
  .otherm .om{font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px;background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
  .fup{margin-top:14px;background:var(--deep);color:#fff;border-radius:12px;padding:14px 16px;font-size:14px;display:flex;gap:10px;align-items:flex-start}
  .fup .ico{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:12px;flex-shrink:0;opacity:.85}

  .rfoot{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}

  /* library */
  .lib h2{font-size:clamp(26px,4.5vw,36px);font-weight:800;margin-bottom:6px}
  .lib .sub{color:var(--ink-soft);margin-bottom:22px}
  .libgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .libc{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px;text-align:left;width:100%;transition:.15s;border-left:4px solid var(--accent)}
  .libc:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .libc .ln{font-weight:700;font-size:15.5px}
  .libc .lk{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:13px 20px;border-radius:12px;font-size:14px;box-shadow:0 18px 40px -18px rgba(0,0,0,.6);opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;z-index:50;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:560px){
    body{font-size:16px}
    .stage{padding:20px 16px 90px}
    .kit,.libgrid{grid-template-columns:1fr}
    .rcard{padding:24px 20px}
    .vcard{grid-template-columns:7px 1fr;}
    .vcard .go{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .qwrap,.rwrap{animation:none}
    .pfill,*{transition:none!important}
  }
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PATHWAY LIBRARY  — shared destinations for all three versions
   ============================================================ */
const PATHS = {
  give:{name:"Make a Clean Water Gift", kicker:"Personal giving",
    why:"The most direct way to help — your gift goes straight to bringing clean water to a community.",
    first:"Choose an amount and give securely. Even a small gift moves a project forward.",
    cta:"Give now", kit:["One-time or monthly options","The impact of your gift","Thank-you and receipt","Share-with-a-friend link"],
    alts:["thewell","one_day","worldwaterday"]},
  thewell:{name:"The Well — Monthly Water Partner", kicker:"Ongoing impact",

    why:"You don't have to give to make a difference. Telling the story is often what moves other people to act.",
    first:"Grab a ready-made post or impact story and share it with people you know today.",

    alts:["one_day","worldwaterday","fundraiser"]},
  school:{name:"School Water Challenge", kicker:"Classrooms & schools",
    why:"Help students understand why clean water matters and give them a practical way to serve together.",
    first:"Pick a challenge window and send the parent email to kick things off.",

  jerrycan:{name:"Jerry Can Kids Champion", kicker:"Kids, families & children's ministry",

    first:"Print the activity guide and try the jerry can experience with your group.",
    cta:"Use the Jerry Can Kids kit", kit:["Jerry Can Kids activity guide","Family / children's ministry instructions","Simple giving challenge","Coloring or activity page","Short water story","Parent or leader email copy"],

  waterwalk:{name:"Water Walk Organizer", kicker:"In-person experience",
    why:"Bring people together around a physical experience that helps participants feel the burden of walking for water.",
    first:"Set a date and use the planning checklist to map your walk.",
    cta:"Plan a Water Walk", kit:["Water Walk planning checklist","Event timeline","Safety & logistics notes","Sign-up copy","Social graphics","Day-of talking points"],
    alts:["church","school","business"]},
  fundraiser:{name:"Personal Water Fundraiser", kicker:"Simple & shareable",
    why:"You don't need a big event to make a meaningful difference — invite friends and family into a simple campaign around a birthday, milestone, or personal goal.",
    first:"Set your goal and create your fundraising page.",
    cta:"Start a fundraiser", kit:["Personal fundraiser setup guide","Sample text messages","Sample email","Social posts","Suggested goals","Thank-you template"],
    alts:["one_day","thewell","worldwaterday"]},
  worldwaterday:{name:"World Water Day Advocate", kicker:"Seasonal campaign",
    why:"Help build awareness and momentum during a focused campaign season with ready-to-use messages and simple actions.",
    first:"Grab the campaign kit and plan your posts for the campaign window.",
    cta:"Join the campaign", kit:["World Water Day action guide","Campaign talking points","Social media kit","Email/text templates","Giving challenge","Project story"],
    alts:["one_day","fundraiser","waterwalk"]},
  business:{name:"Business or Community Partner", kicker:"Companies, clubs & civic groups",
    why:"You may be in a position to gather people, sponsor impact, or use your platform to bring clean water to more communities.",
    first:"Use the engagement guide to set a group goal and invite participation.",
    cta:"Bring WorldServe to your organization", kit:["Business / community engagement guide","Sponsorship options","Group fundraising ideas","Employee / customer communication copy","Event or matching-gift ideas","Project story"],
    alts:["waterwalk","sponsor","one_day"]},
  empowerher:{name:"EmpowerHER Advocate", kicker:"Women & girls",
    why:"You're drawn to how clean water changes daily life for women and girls — education, dignity, health, and opportunity.",
    first:"Read the overview and share the connection between water and women's lives.",
    cta:"Explore EmpowerHER", kit:["EmpowerHER overview","Women-and-water talking points","SifaPads impact story","Social posts","Small-group discussion guide","Giving circle link"],
    alts:["fundraiser","sponsor","one_day"]},
  church:{name:"Church Water Sunday Host", kicker:"Churches & faith communities",
    why:"You may be well-positioned to help your church learn, pray, give, and take action together around clean water.",
    first:"Choose a Sunday or campaign window when your church could highlight clean water and invite a response.",
    cta:"Explore the Church kit", kit:["Church Water Sunday planning guide","Pastor / leader talking points","Announcement script","Slides or bulletin copy","Social media posts","Donation setup + follow-up copy"],
    alts:["waterwalk","jerrycan","sponsor"]},
  sponsor:{name:"Project Sponsor / Major Donor", kicker:"A conversation, not a checkout", human:true,
    why:"You may be interested in funding a specific project or community need. This connects you with our team to learn about current priorities, project costs, and sponsorship opportunities.",
    first:"Tell us a little about what you're interested in — a real person from WorldServe will follow up to talk it through.",
    cta:"Talk with WorldServe", kit:["Project sponsorship overview","Current project menu / examples","Impact report","A direct line to a team member","Suggested next conversation"],
    alts:["church","business","thewell"]}
};

/* Resource picker menu (the original "Question 6", shown on results for A & B) */
const RESOURCES = ["Something simple right now","A toolkit for a group","Help starting a fundraiser",
  "A church activation plan","A school or kids' activity","A story I can share","A campaign to join","Someone to follow up"];

/* ============================================================
   VERSION META
   ============================================================ */
const VERSIONS = {
  // NOTE: internal keys (A/B/C) drive the routing engine and are intentionally left as-is.
  // The "tag" is what the user sees, and HOME_ORDER controls the on-screen order.
  A:{tag:"Version C (Intent Start)", name:"The Adaptive Front Door",
     philo:"One tap routes most people; only the genuinely unsure get follow-up questions.",
     accent:"a", meta:"0–2 questions · branching", first:"a_tile"},
  B:{tag:"Version B (Blended Intent + Questions)", name:"The Four-Question Quiz",
     philo:"A familiar linear quiz, trimmed to four questions, resources on the result page.",
     accent:"b", meta:"4 questions · linear", first:"b1"},
  C:{tag:"WorldServe International's", name:"Six Question Discovery Tool",
     philo:"",
     accent:"c", meta:"", first:"c1"}
};
const HOME_ORDER = ["C"]; // Only Version A (the original six-question finder)

/* ============================================================
   STEP DEFINITIONS
   options carry scores{pathId:weight} + a plain-English "why"
   ============================================================ */
const STEPS = {
  /* ---------- VERSION A (decision tree) ---------- */
  a_tile:{v:"A", type:"single", q:"What would you like to do?",
    purpose:"The tile you tap already tells us your action style — so we never ask it again.",
    options:[
      {id:"give", l:"Give now", d:"A single gift, straight to clean water"},
      {id:"share", l:"Share WorldServe's story", d:"Help others see the need"},
      {id:"fundraise", l:"Raise money with others", d:"Invite people into a goal"},
      {id:"church", l:"Get my church involved", d:"Mobilize a faith community"},
      {id:"kids", l:"Do something with kids or students", d:"Classroom, ministry, or family"},
      {id:"business", l:"Get my company, club, or group involved", d:"Use your platform"},
      {id:"sponsor", l:"Sponsor a project or make a major gift", d:"Talk with our team — skip the questions"},
      {id:"explore", l:"I'm just exploring", d:"Not sure yet"}
    ]},
  a_fund_scale:{v:"A", type:"single", q:"Who would you raise money with?",
    options:[
      {id:"just_me", l:"Just me", d:"A personal page I can share"},
      {id:"friends_family", l:"Friends or family", d:"Around a birthday, milestone, or goal"},
      {id:"group", l:"A bigger group or community", d:"A team effort or shared event"}
    ]},
  a_fund_time:{v:"A", type:"single", q:"How much time do you have right now?",
    purpose:"Capacity only — so we don't hand a busy person a month-long plan.",
    options:[
      {id:"min10", l:"About 10 minutes", d:"Keep it very simple"},
      {id:"more", l:"I've got more time", d:"I can set something up properly"}
    ]},
  a_church_goal:{v:"A", type:"single", q:"What would you like your church to do?",
    options:[
      {id:"generosity", l:"Come together around generosity", d:"Learn, pray, give"},
      {id:"kids", l:"Engage our kids or youth", d:"Something hands-on for children"},
      {id:"inperson", l:"Have an in-person experience", d:"A shared event"},
      {id:"fund", l:"Help fund a larger need", d:"A bigger project gift"},
      {id:"simple", l:"Start with something simple", d:"An easy first step"}
    ]},
  a_kids_setting:{v:"A", type:"single", q:"Where will the kids be?",
    options:[
      {id:"classroom", l:"A classroom or school", d:"School-age students"},
      {id:"youth", l:"A youth group", d:"Older kids and teens"},
      {id:"ministry", l:"Children's ministry", d:"A church kids' program"},
      {id:"family", l:"At home with family", d:"Younger children"}
    ]},
  a_biz_focus:{v:"A", type:"single", q:"What feels right for your organization?",
    options:[

const ANSWER_ORDER = { B:["b1","b2","b3","b4"], C:["c1","c2","c3","c3a","c4","c5","c6"] };
const PRIORITY = ["sponsor","empowerher","church","school","jerrycan","waterwalk","business","fundraiser","worldwaterday","share","thewell","give","one_day"];

/* ============================================================
   STATE + NAVIGATION
   ============================================================ */
const app = { version:null, answers:{}, history:[], picks:[], lastResult:null };

function setAccent(v){
  const a = VERSIONS[v] ? VERSIONS[v].accent : "a";
  const r = document.documentElement.style;
  r.setProperty('--accent', `var(--${a})`);
  r.setProperty('--deep', `var(--${a}-deep)`);
  r.setProperty('--tint', `var(--${a}-tint)`);
  r.setProperty('--tint2', `var(--${a}-tint2)`);
}

function nextStep(stepId){
  const v = app.version;
  if(v==="B"){ const i=ANSWER_ORDER.B.indexOf(stepId); return i<3?ANSWER_ORDER.B[i+1]:"RESULT"; }
  if(v==="C"){
    if(stepId==="c1") return "c2";
    if(stepId==="c2") return "c3";
    if(stepId==="c3"){ const o=STEPS.c3.options.find(x=>x.id===app.answers.c3); return (o&&o.goal)?"c3a":"c4"; }
    if(stepId==="c3a") return "c4";
    if(stepId==="c4") return "c5";
    if(stepId==="c5") return "c6";
    if(stepId==="c6") return "RESULT";
  }
  if(v==="A"){
    if(stepId==="a_tile"){
      const t=app.answers.a_tile;
      if(t==="give"||t==="share"||t==="sponsor") return "RESULT";
      if(t==="fundraise") return "a_fund_scale";
      if(t==="church") return "a_church_goal";
      if(t==="kids") return "a_kids_setting";
      if(t==="business") return "a_biz_focus";
      if(t==="explore") return "a_explore";
    }
    if(stepId==="a_fund_scale") return "a_fund_time";
    return "RESULT"; // all other A follow-ups end the flow
  }
  return "RESULT";
}

function estimateTotal(){
  if(app.version==="B") return 4;
  if(app.version==="C") return STEPS.c3 && app.answers.c3 && STEPS.c3.options.find(x=>x.id===app.answers.c3)?.goal ? 7 : 6;
  if(app.version==="A"){
    const t=app.answers.a_tile;
    if(!t) return 1;
    if(t==="give"||t==="share"||t==="sponsor") return 1;
    if(t==="fundraise") return 3;
    return 2;
  }
  return 1;
}

/* ============================================================
   ROUTING LOGIC
   ============================================================ */
function routeA(){
  const t=app.answers.a_tile;
  const T=(id,trace)=>({id, trace, others:[]});
  if(t==="give") return T("give",["You chose <b>Give now</b> — we take you straight to a gift page, no questions in between."]);
  if(t==="share") return T("share",["You chose <b>Share the story</b> — here's a ready-made share kit."]);
  if(t==="sponsor") return T("sponsor",["You chose <b>Sponsor a project / major gift</b> — so we skip the quiz entirely and connect you with a real person."]);
  if(t==="fundraise"){
    if(app.answers.a_fund_time==="min10") return T("one_day",["You want to raise money but only have ~10 minutes — so we point you to the simplest ready-made option."]);
    if(app.answers.a_fund_scale==="group") return T("waterwalk",["Raising money with a larger group — a Water Walk gives the group something to rally around."]);
    return T("fundraiser",["Raising money with "+(app.answers.a_fund_scale==="just_me"?"just you":"friends or family")+" — a personal fundraiser is the simplest shareable option."]);
  }
  if(t==="church"){
    const m={generosity:"church",kids:"jerrycan",inperson:"waterwalk",fund:"sponsor",simple:"one_day"};
    const g=app.answers.a_church_goal; const lbl={generosity:"come together around generosity",kids:"engage your kids or youth",inperson:"have an in-person experience",fund:"fund a larger need",simple:"start simple"}[g];
    return T(m[g],["You want your church to <b>"+lbl+"</b> — which points to this pathway."]);
  }
  if(t==="kids"){
    const m={classroom:"school",youth:"school",ministry:"jerrycan",family:"jerrycan"};
    const s=app.answers.a_kids_setting; const lbl={classroom:"a classroom or school",youth:"a youth group",ministry:"children's ministry",family:"younger kids at home"}[s];
    return T(m[s],["The kids are in <b>"+lbl+"</b> — so we match the age-appropriate kit."]);
  }
  if(t==="business"){
    const m={sponsor:"sponsor",rally:"business",event:"waterwalk",not_sure:"business"};
    const f=app.answers.a_biz_focus; const lbl={sponsor:"sponsor impact",rally:"rally your people",event:"host an event",not_sure:"see the options"}[f];
    return T(m[f],["Your organization wants to <b>"+lbl+"</b>."]);
  }
  return T("one_day",["Just exploring — One Day for Water is the easiest place to start, and you can branch out from there."]);
}

function scoreRoute(){
  const v=app.version, tally={}, whyBy={};
  let simple=0;
  ANSWER_ORDER[v].forEach(sid=>{
    if(app.answers[sid]==null) return;
    const step=STEPS[sid];
    const sel=Array.isArray(app.answers[sid])?app.answers[sid]:[app.answers[sid]];
    sel.forEach(oid=>{
      const o=step.options.find(x=>x.id===oid); if(!o) return;
      if(o.flag==="simple") simple+=2;
      if(o.scores) for(const p in o.scores){
        tally[p]=(tally[p]||0)+o.scores[p];
        if(o.why){ (whyBy[p]=whyBy[p]||[]).push(o.why); }
      }
    });
  });
  if(simple) tally.one_day=(tally.one_day||0)+simple;
  const ids=Object.keys(tally).filter(p=>tally[p]>0);
  if(!ids.length) return {id:"one_day", trace:["We didn't get a strong signal, so we're starting you with the simplest option."], others:[]};
  ids.sort((a,b)=> tally[b]-tally[a] || PRIORITY.indexOf(a)-PRIORITY.indexOf(b));
  const win=ids[0];
  const trace=(whyBy[win]||[]).slice(0,5);
  if(simple && win==="one_day") trace.push("Your limited time pushed you toward the simplest option.");
  const others=ids.slice(1,4);
  return {id:win, trace, others};
}

function computeResult(){
  let r = app.version==="A" ? routeA() : scoreRoute();
  // follow-up flag (Version C only)
  r.followup = app.version==="C" && Array.isArray(app.answers.c6) && app.answers.c6.includes("follow_up");
  return r;
}

const stage=document.getElementById('stage');
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function render(){
  if(!app.version){ renderHome(); return; }
  const cur = app.history[app.history.length-1];
  if(cur==="RESULT"){ renderResult(); return; }
  if(cur==="LIBRARY"){ renderLibrary(); return; }
  renderStep(cur);
}

function chrome(){
  const V=VERSIONS[app.version];
  return `<div class="topbar">
      <span class="vpill">${V.tag}</span>
      <div>
        ${app.history.length>1?'<button class="linkbtn" id="backBtn">← Back</button>':''}

    </div>

}

function progressBar(){
  const total=estimateTotal();
  const n=app.history.filter(s=>s!=="RESULT"&&s!=="LIBRARY").length;
  const pct=Math.min(100, Math.round((n/Math.max(total,1))*100));
  const label = app.version==="A" ? `Step ${n}` : `Question ${n} of ${total}`;
  return `<div class="progress"><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div><span class="plabel">${label}</span></div>`;
}

function renderStep(stepId){
  setAccent(app.version);
  const step=STEPS[stepId];
  const isMulti=step.type==="multi";
  const chosen = isMulti ? (app.answers[stepId]||[]) : app.answers[stepId];
  let opts="";
  step.options.forEach(o=>{
    const sel = isMulti ? chosen.includes(o.id) : chosen===o.id;
    opts+=`<button class="opt ${sel?'sel':''}" data-opt="${o.id}">
      ${isMulti?`<span class="mk"></span>`:``}
      <span class="ot"><span class="ol">${esc(o.l)}</span>${o.d?`<span class="od">${esc(o.d)}</span>`:''}</span>
      ${isMulti?``:`<span class="arr">→</span>`}
    </button>`;
  });
  stage.innerHTML = chrome() + progressBar() + `
    <div class="qwrap">
      <div class="qhead">
        <h2>${esc(step.q)}</h2>
        ${isMulti?`<p class="qhint">Choose up to ${step.max}.</p>`:''}
      </div>
      <div class="opts">${opts}</div>
      ${isMulti?`<div class="continue"><button class="btn" id="contBtn" ${chosen.length?'':'disabled'}>Continue</button></div>`:''}
      <div class="resetrow"><button class="linkbtn" id="resetBtn">↺ Start again</button></div>
    </div>`;
  wireChrome();
  stage.querySelectorAll('[data-opt]').forEach(b=>{
    b.onclick=()=>{
      if(isMulti){
        let arr=app.answers[stepId]||[];
        if(arr.includes(b.dataset.opt)) arr=arr.filter(x=>x!==b.dataset.opt);
        else if(arr.length<step.max) arr=[...arr,b.dataset.opt];
        app.answers[stepId]=arr;
        renderStep(stepId);
      } else {
        app.answers[stepId]=b.dataset.opt;
        advance(stepId);
      }
    };
  });
  if(isMulti){ const c=document.getElementById('contBtn'); if(c) c.onclick=()=>advance(stepId); }
  const rb=document.getElementById('resetBtn'); if(rb) rb.onclick=()=>startVersion(app.version);
}

function advance(stepId){
  const nx=nextStep(stepId);
  app.history.push(nx);
  render();
}

function pathCard(id){
  const p=PATHS[id];
  return `<button class="altc" data-path="${id}">
    <span><span class="an">${esc(p.name)}</span><br><span class="ad">${esc(p.kicker)}</span></span>
    <span class="ag">→</span></button>`;
}

function renderResult(){
  setAccent(app.version);
  const r = app.lastResult || (app.lastResult = computeResult());
  const p = PATHS[r.id];
  const showPicker = app.version!=="C"; // A & B place the resource menu on the result page
  const picksFromC = app.version==="C" ? (app.answers.c6||[]).filter(x=>x!=="recommend"&&x!=="follow_up") : [];

  let kit = p.kit.map(k=>`<li>${esc(k)}</li>`).join("");
  let alts = p.alts.map(pathCard).join("");

  let picker="";
  if(showPicker){
    picker=`<div class="altlab">What would help most?</div>
      <div class="picker" id="picker">${RESOURCES.map(rsc=>`<button class="pk ${app.picks.includes(rsc)?'on':''}" data-res="${esc(rsc)}">${esc(rsc)}</button>`).join("")}</div>
      <p class="pickhint">Pick up to two — we'll add them to your starter kit. <span class="mono">(${app.picks.length}/2 selected)</span></p>`;
  } else if(picksFromC.length){
    picker=`<div class="altlab">Because you asked for…</div><div class="picker">${picksFromC.map(id=>{const o=STEPS.c6.options.find(x=>x.id===id);return o?`<span class="pk on">${esc(o.l)}</span>`:'';}).join("")}</div>`;
  }

  let traceList = r.trace.map(t=>`<li>${t}</li>`).join("");
  let others = r.others && r.others.length
     ? `<div class="lh">Other strong matches from your answers</div><div class="otherm">${r.others.map(o=>`<span class="om">${esc(PATHS[o].name)}</span>`).join("")}</div>`
     : "";
  const logicTitle = app.version==="A" ? "How the front door routed you" : "How the engine scored your answers";

  stage.innerHTML = chrome() + `
    <div class="rwrap">
      <div class="rkick">Your best next step${p.human?" · we'll connect you with a person":""}</div>
      <div class="rcard">
        <div class="rkick">${esc(p.kicker)}</div>
        <h2>${esc(p.name)}</h2>
        <p class="rwhy">${esc(p.why)}</p>
        <div class="rstep">
          <div class="lab">Your first step</div>
          <p>${esc(p.first)}</p>
        </div>
        <div class="rprimary"><button class="btn" id="ctaBtn">${esc(p.cta)}</button></div>

        <div class="kitlab">Your starter kit</div>
        <ul class="kit">${kit}${app.picks.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>

        ${picker}

        <details class="logic">
          <summary>Why you landed here <span class="chev">▸</span></summary>
          <div class="lbody">
            <div class="lh">${logicTitle}</div>
            <ul>${traceList}</ul>
            ${others}
          </div>
        </details>

        ${r.followup?`<div class="fup"><span class="ico">FOLLOW-UP</span><span>You asked for someone from WorldServe to reach out — your details and this pathway would be flagged for a personal follow-up.</span></div>`:''}
      </div>

      <div class="altlab">Not quite right? Also explore</div>
      <div class="alts">${alts}</div>

      <div class="rfoot">
        <button class="btn ghost" id="libBtn">See all pathways</button>
        <button class="btn" id="restartBtn">Start over</button>
      </div>
    </div>`;
  wireChrome();
  document.getElementById('ctaBtn').onclick=()=>toast('Demo — in the live tool this opens: “'+p.cta+'”');
  document.getElementById('libBtn').onclick=()=>{ app.history.push("LIBRARY"); render(); };
  document.getElementById('restartBtn').onclick=()=>startVersion(app.version);
  stage.querySelectorAll('[data-path]').forEach(b=>b.onclick=()=>jumpToPath(b.dataset.path));
  if(showPicker){
    stage.querySelectorAll('[data-res]').forEach(b=>b.onclick=()=>{
      const v=b.dataset.res;
      if(app.picks.includes(v)) app.picks=app.picks.filter(x=>x!==v);
      else if(app.picks.length<2) app.picks=[...app.picks,v];
      renderResult();
    });
  }
}

function jumpToPath(id){
  app.lastResult={ id, trace:["You opened this pathway directly from the “also explore” list."], others:[], followup:false };
  // keep history pointing at RESULT
  if(app.history[app.history.length-1]!=="RESULT") app.history.push("RESULT");
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderLibrary(){
  setAccent(app.version);
  const cards=Object.keys(PATHS).map(id=>{
    const p=PATHS[id];
    return `<button class="libc" data-path="${id}"><span class="ln">${esc(p.name)}</span><div class="lk">${esc(p.kicker)}</div></button>`;
  }).join("");
  stage.innerHTML = chrome() + `
    <div class="lib">
      <h2>All pathways</h2>
      <p class="sub">Every destination the finder can route to. Tap any one to see its result page.</p>
      <div class="libgrid">${cards}</div>
      <div class="rfoot"><button class="btn" id="restartBtn">Start over</button></div>
    </div>`;
  wireChrome();
  document.getElementById('restartBtn').onclick=()=>startVersion(app.version);
  stage.querySelectorAll('[data-path]').forEach(b=>b.onclick=()=>jumpToPath(b.dataset.path));
}

/* ---------- chrome wiring ---------- */
function wireChrome(){
  const back=document.getElementById('backBtn');
  if(back) back.onclick=()=>{
    if(app.history.length>1){
      const popped=app.history.pop();
      if(popped==="RESULT"||popped==="LIBRARY"){ app.lastResult=null; }
      else { delete app.answers[popped]; }
      app.lastResult=null;
      render();
    }
  };
  const home=document.getElementById('homeBtn'); if(home) home.onclick=goHome;
}

/* ---------- transitions ---------- */
function startVersion(v){
  app.version=v; app.answers={}; app.picks=[]; app.lastResult=null;
  app.history=[VERSIONS[v].first];
  render(); window.scrollTo({top:0});
}
function goHome(){
  app.version=null; app.answers={}; app.history=[]; app.picks=[]; app.lastResult=null;
  render(); window.scrollTo({top:0});
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2600);
}

render();
</script>
</body>
</html>
